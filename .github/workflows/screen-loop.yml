name: Automated Stock Screening

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  push:
    branches: [ main, master ]
  repository_dispatch:
    types: [ external-trigger ]
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  screen-stocks:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Allow it to run longer than 15 mins if needed (GitHub gives up to 6 hours free)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Screening Script
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: npx tsx scripts/run-screen.ts
